name: Deploy to Production VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.PORT }} -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

      - name: Deploy directly to live folder
        run: |
          echo "======================================"
          echo "Current commit:"
          echo "${{ github.sha }}"
          echo ""
          echo "Deploying directly to:"
          echo "/var/www/eddie-marketing"
          echo "======================================"

          rsync -avz --delete --progress \
            --exclude-from=.rsyncignore \
            -e "ssh -p ${{ secrets.PORT }}" \
            ./ \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }}:/var/www/eddie-marketing/

          ssh -p ${{ secrets.PORT }} \
            ${{ secrets.USERNAME }}@${{ secrets.HOST }} << EOF

            set -e

            cd /var/www/eddie-marketing

            echo "${{ github.sha }}" > VERSION
            echo "Branch: ${{ github.ref_name }}" >> VERSION
            echo "Commit: ${{ github.event.head_commit.message }}" >> VERSION
            echo "Deployed: $(date -u)" >> VERSION

            /home/eddie/deploy.sh

            echo ""
            echo "========== DEPLOYED VERSION =========="
            cat VERSION
            echo "======================================"

          EOF
